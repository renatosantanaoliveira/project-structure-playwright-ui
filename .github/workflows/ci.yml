name: Playwright Tests CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment to run the tests against
        required: true
        default: qa
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.target_environment || 'qa' }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      TEST_ENV: ${{ github.event.inputs.target_environment || 'qa' }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate target environment
        run: |
          if [ ! -f "config/${TEST_ENV}.config.ts" ]; then
            echo "Environment '${TEST_ENV}' is not configured. Expected file: config/${TEST_ENV}.config.ts"
            exit 1
          fi

      - name: Restore Allure history
        uses: actions/cache/restore@v5
        with:
          path: .allure-history
          key: allure-history-${{ env.TEST_ENV }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            allure-history-${{ env.TEST_ENV }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm test
        env:
          NODE_ENV: ${{ env.TEST_ENV }}

      - name: Prepare Allure history
        if: always()
        run: |
          if [ -d ".allure-history" ]; then
            mkdir -p allure-results/history
            cp -R .allure-history/. allure-results/history/
          fi

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Preserve Allure history
        id: preserve-allure-history
        if: always()
        run: |
          rm -rf .allure-history
          mkdir -p .allure-history
          if [ -d "allure-report/history" ]; then
            cp -R allure-report/history/. .allure-history/
            echo "history_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "history_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save Allure history
        if: always() && steps.preserve-allure-history.outputs.history_found == 'true'
        uses: actions/cache/save@v5
        with:
          path: .allure-history
          key: allure-history-${{ env.TEST_ENV }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-${{ env.TEST_ENV }}
          path: allure-report

      - name: Upload Allure results (raw)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-${{ env.TEST_ENV }}
          path: allure-results

      - name: Upload GitHub Pages artifact
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref_name == github.event.repository.default_branch
        uses: actions/upload-pages-artifact@v5
        with:
          path: allure-report

  deploy-pages:
    needs: test
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
